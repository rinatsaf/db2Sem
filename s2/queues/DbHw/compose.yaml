services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rk091011
      POSTGRES_DB: task_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  producer:
    build:
      context: .
      dockerfile: DbHw/Dockerfile
    depends_on:
      - db
    environment:
      - ConnectionStrings__Default=Host=db;Username=postgres;Password=rk091011;Database=task_db

  worker1:
    build:
      context: .
      dockerfile: Consumer/Dockerfile
    depends_on:
      - db
    environment:
      - ConnectionStrings__Default=Host=db;Username=postgres;Password=rk091011;Database=task_db

  worker2:
    build:
      context: .
      dockerfile: Consumer/Dockerfile
    depends_on:
      - db
    environment:
      - ConnectionStrings__Default=Host=db;Username=postgres;Password=rk091011;Database=task_db

volumes:
  db_data: